services:

  # ─── Base de datos ───────────────────────────────────────
  mongo:
    image: mongo:6
    container_name: lidar_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - lidar_network

  # ─── Backend ─────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: lidar_backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - lidar_network

  # ─── Frontend ────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: lidar_frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - lidar_network

# ─── Volumen para persistencia de datos ──────────────────
volumes:
  mongo_data:

# ─── Red interna entre contenedores ──────────────────────
networks:
  lidar_network:
    driver: bridge