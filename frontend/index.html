<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiDAR Events Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 2px solid #00d4ff;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 1.5rem;
      color: #00d4ff;
      letter-spacing: 2px;
    }

    #status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    #status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ff88;
      animation: pulse 1.5s infinite;
    }

    #status-dot.error { background: #ff4444; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .stats {
      display: flex;
      gap: 20px;
      padding: 30px 40px;
    }

    .stat-card {
      background: #1a1d2e;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 20px 30px;
      flex: 1;
      text-align: center;
    }

    .stat-card h2 {
      font-size: 2.5rem;
      color: #00d4ff;
    }

    .stat-card p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 5px;
    }

    .controls {
      padding: 0 40px 20px;
      display: flex;
      gap: 10px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.8; }

    #btn-refresh { background: #00d4ff; color: #0f1117; }
    #btn-clear   { background: #ff4444; color: white; }

    .table-container {
      padding: 0 40px 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #1a1d2e;
      border-radius: 12px;
      overflow: hidden;
    }

    thead {
      background: #12152a;
    }

    th {
      padding: 15px 20px;
      text-align: left;
      font-size: 0.8rem;
      color: #00d4ff;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    td {
      padding: 14px 20px;
      border-top: 1px solid #2a2d3e;
      font-size: 0.9rem;
    }

    tr:hover td { background: #12152a; }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #00d4ff22;
      color: #00d4ff;
      border: 1px solid #00d4ff44;
    }

    .data-cell {
      font-family: monospace;
      font-size: 0.8rem;
      color: #aaa;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #empty-state {
      text-align: center;
      padding: 60px;
      color: #555;
    }

    #empty-state p { margin-top: 10px; font-size: 0.9rem; }
  </style>
</head>
<body>

  <header>
    <h1>⚡ LIDAR EVENTS DASHBOARD</h1>
    <div id="status">
      <div id="status-dot"></div>
      <span id="status-text">Conectado</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat-card">
      <h2 id="total-count">0</h2>
      <p>Total de Eventos</p>
    </div>
    <div class="stat-card">
      <h2 id="last-event">—</h2>
      <p>Último Evento</p>
    </div>
    <div class="stat-card">
      <h2 id="last-time">—</h2>
      <p>Última Actualización</p>
    </div>
  </div>

  <div class="controls">
    <button id="btn-refresh" onclick="fetchEvents()">🔄 Actualizar</button>
    <button id="btn-clear" onclick="clearEvents()">🗑️ Limpiar</button>
  </div>

  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Tipo de Evento</th>
          <th>Datos</th>
          <th>Timestamp</th>
        </tr>
      </thead>
      <tbody id="events-body">
        <tr id="empty-state">
          <td colspan="4">
            <p>🔍 No hay eventos registrados aún</p>
            <p>Envía eventos desde tu sistema LiDAR para verlos aquí</p>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:3000';

    async function fetchEvents() {
      try {
        const res = await fetch(`${BACKEND_URL}/events`);
        const events = await res.json();

        // Actualizar stats
        document.getElementById('total-count').textContent = events.length;
        document.getElementById('last-time').textContent =
          new Date().toLocaleTimeString('es');

        if (events.length > 0) {
          document.getElementById('last-event').textContent = events[0].type;
        }

        // Actualizar tabla
        const tbody = document.getElementById('events-body');

        if (events.length === 0) {
          tbody.innerHTML = `
            <tr id="empty-state">
              <td colspan="4">
                <p>🔍 No hay eventos registrados aún</p>
              </td>
            </tr>`;
          return;
        }

        tbody.innerHTML = events.map((e, i) => `
          <tr>
            <td>${events.length - i}</td>
            <td><span class="badge">${e.type}</span></td>
            <td class="data-cell">${e.data ? JSON.stringify(e.data) : '—'}</td>
            <td>${new Date(e.timestamp).toLocaleString('es')}</td>
          </tr>
        `).join('');

        setStatus(true);

      } catch (err) {
        setStatus(false);
        console.error('Error conectando al backend:', err);
      }
    }

    async function clearEvents() {
      if (!confirm('¿Seguro que deseas limpiar todos los eventos?')) return;
      try {
        await fetch(`${BACKEND_URL}/events`, { method: 'DELETE' });
        fetchEvents();
      } catch (err) {
        console.error('Error al limpiar eventos:', err);
      }
    }

    function setStatus(online) {
      const dot = document.getElementById('status-dot');
      const text = document.getElementById('status-text');
      if (online) {
        dot.className = '';
        text.textContent = 'Conectado';
      } else {
        dot.className = 'error';
        text.textContent = 'Sin conexión';
      }
    }

    // Cargar eventos al iniciar y cada 5 segundos
    fetchEvents();
    setInterval(fetchEvents, 5000);
  </script>

</body>
</html>
